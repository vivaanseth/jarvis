name: Bug report
description: Report a reproducible Jarvis problem without including private data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not paste API keys, OAuth tokens, private prompts, memory exports, or personal documents.
  - type: input
    id: version
    attributes:
      label: Jarvis version
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac architecture
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
